task: mgsm_ja
dataset_path: juletxara/mgsm
test_split: test
output_type: generate_until
process_docs: !function utils.process_docs
doc_to_text: "{{question}}\nステップごとに考えて、最終的な答えを数値で示してください。"
doc_to_target: "{{answer_number}}"
process_results: !function utils.process_results
generation_kwargs:
  max_new_tokens: 4096
  temperature: 0.0
  do_sample: false
  until:
    - "</s>"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
dataset_kwargs:
  revision: refs/convert/parquet
